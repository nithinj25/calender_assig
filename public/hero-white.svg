<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Soft White Abstract Hero</title>
  <desc id="heroDesc">A bright abstract white and blue background with subtle geometric forms.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="52%" stop-color="#f6f9ff"/>
      <stop offset="100%" stop-color="#edf3ff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="78%" cy="26%" r="50%">
      <stop offset="0%" stop-color="#c9dcff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c9dcff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="16%" cy="70%" r="62%">
